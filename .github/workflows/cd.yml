name: deploy-installer

# WHEN to run:
#   workflow_dispatch - manual trigger from GitHub UI (you pick the target)
#   release           - auto-deploy whenever a Release is published
on:
  workflow_dispatch:
    inputs:
      target_host:
        description: "Target machine hostname or IP"
        required: true
      ssh_user:
        description: "SSH user on the target"
        required: true
        default: "vboxuser"
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted

    # gh CLI needs read access to the Release.
    permissions:
      contents: read

    steps:
      # 1. Check out the repo (we need cd/deploy.sh)
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install gh CLI
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            sudo mkdir -p -m 755 /etc/apt/keyrings
            wget -nv -O- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt-get update -qq
            sudo apt-get install -y gh
          fi

      # 2. Download the installer from the most recent GitHub Release.
      #    Releases are published by CI when a tag like v1.0.0 is pushed,
      #    so they are the canonical "storage" for the .run file.
      - name: Download installer from latest Release
        run: |
          # Find the latest release tag, then download its k8s-installer.run asset
          URL=$(curl -sL "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
                | grep '"browser_download_url"' \
                | grep 'k8s-installer.run' \
                | cut -d'"' -f4)
          if [[ -z "$URL" ]]; then
            echo "No k8s-installer.run found in latest release"; exit 1
          fi
          curl -L -o k8s-installer.run "$URL"
          ls -lh k8s-installer.run

      # 3. Set up the SSH key so deploy.sh can connect to the target.
      #    The private key is stored as a repo secret (Settings -> Secrets).
      - name: Set up SSH key
        env:
          SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          TARGET="${{ inputs.target_host }}"
          if [[ -n "$TARGET" ]]; then
            ssh-keyscan -H "$TARGET" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

      # 4. Run the deployment
      - name: Deploy to target
        run: |
          chmod +x cd/deploy.sh k8s-installer.run
          ./cd/deploy.sh \
            ./k8s-installer.run \
            "${{ inputs.target_host }}" \
            "${{ inputs.ssh_user }}"

      # 5. Notify on failure (GitHub also emails by default)
      - name: Notify failure
        if: failure()
        run: |
          echo "::error::CD pipeline failed for ${{ inputs.target_host }}"
          echo "Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
